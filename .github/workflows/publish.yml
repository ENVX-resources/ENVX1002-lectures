on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.8.26

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Discover R package dependencies
        id: deps
        run: |
          Rscript -e '
            install.packages(c("renv", "knitr", "rmarkdown"))
            pkgs <- unique(renv::dependencies(quiet = TRUE)$Package)
            pkgs <- setdiff(pkgs, c("R", rownames(installed.packages(priority = "base"))))
            # Suggests-tier packages loaded at runtime (e.g. by performance::check_model)
            # and packages referenced only as YAML strings (e.g. dev: "ragg_png" in
            # lectures/_metadata.yml) which renv::dependencies() cannot discover.
            soft_extras <- c("see", "patchwork", "qqplotr", "ragg", "systemfonts")
            pkgs <- unique(c(pkgs, soft_extras))
            refs <- paste0("any::", sort(pkgs))
            writeLines(refs, "r-packages.txt")
            cat("Detected", length(refs), "packages:\n")
            cat(paste(" -", refs), sep = "\n")'
          {
            echo "packages<<EOF"
            cat r-packages.txt
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: ${{ steps.deps.outputs.packages }}
          cache-version: 1
          install-quarto: 'false'

      - name: Cache Typst packages
        # Bump the v<N> prefix to force a cache refresh (e.g. if a qmd starts
        # using an @preview import that isn't covered by the hashed paths).
        uses: actions/cache@v4
        with:
          path: ~/.cache/typst/packages
          key: typst-packages-v1-${{ hashFiles('_extensions/**/*.typ', '_quarto.yml') }}
          restore-keys: typst-packages-v1-

      - name: Render site
        env:
          # Verbose Quarto logs so any future render hang is diagnosable in
          # one run rather than across days. See quarto-cli#12977.
          QUARTO_LOG_LEVEL: DEBUG
        run: quarto render --verbose

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
